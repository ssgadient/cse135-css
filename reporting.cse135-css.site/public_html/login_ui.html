<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Login</title>
  <link rel="stylesheet" href="style/index.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f3f4f6; }
    .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    #loginError { color: #dc2626; margin-top: 15px; font-size: 14px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Metrics Reporting</h2>
    <p style="color: #6b7280; margin-bottom: 25px;">Please sign in to your account</p>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required autofocus>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Sign In</button>
    </form>
    <div id="loginError"></div>
  </div>

  <script>
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        errorDiv.innerText = "";

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                if (data.role === 'viewer') window.location.href = 'reports.html';
                else window.location.href = 'metrics.html';
            } else {
                errorDiv.innerText = "Invalid username or password";
            }
        } catch (err) {
            errorDiv.innerText = "Connection error. Please try again.";
        }
    };
  </script>
</body>
</html>
