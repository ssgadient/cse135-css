<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Metrics Reporting</title>
  <link rel="stylesheet" href="style/index.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div id="loginContainer" style="display:none;padding:50px;text-align:center;">

<section class="controls" style="max-width:400px;margin:auto;display:block;">

<h2>Dashboard Login</h2>

<form id="loginForm">
<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Log In</button>
</form>

<div id="loginError"></div>

</section>
</div>

<main id="dashboardContainer" style="display:none;">

<header style="display:flex;justify-content:space-between;align-items:center;padding:0 20px;">
<h1>Metrics Dashboard</h1>

<div>
<button class="export-btn" onclick="exportPDF()">Export PDF</button>
<button onclick="window.location.href='/api/admin/'">Admin</button>
<button id="logoutBtn">Logout</button>
</div>

</header>

<section class="controls">

<input id="idFilter" placeholder="Filter by ID">
<input id="typeFilter" placeholder="Filter by event type">
<input id="sessionFilter" placeholder="Filter by session id">

<button onclick="loadMetrics()">Load Metrics</button>

</section>

<section class="charts-grid">

<div class="chart-card">
<h2>Event Type Distribution</h2>
<canvas id="eventChart"></canvas>
</div>

<div class="chart-card">
<h2>Events Over Time</h2>
<canvas id="timeChart"></canvas>
</div>

<div class="chart-card">
<h2>Top Referrers</h2>
<canvas id="referrerChart"></canvas>
</div>

<div class="chart-card">
<h2>Events per Session</h2>
<canvas id="sessionChart"></canvas>
</div>

</section>

<section class="table-container">
<div class="table-scroll">
<table id="metricsTable">

<thead>
<tr>
<th>ID</th>
<th>Session</th>
<th>Event</th>
<th>Page</th>
<th>Title</th>
<th>Referrer</th>
<th>Client Time</th>
<th>Server Time</th>
<th>IP</th>
<th>Data</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>
</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="scripts/app.js"></script>

</body>
</html>
