name: Deploy to Prod

on:
  push:
    branches:
      - main  # or whichever branch you want to deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup SSH agent
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Add known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # Push to bare repo (triggers your post-receive hook)
      - name: Push to bare repo
        run: |
          git remote add prod "ssh://deploy@${{ secrets.DEPLOY_HOST }}/var/repo/cse135-css.git" || true
          git push -f prod main