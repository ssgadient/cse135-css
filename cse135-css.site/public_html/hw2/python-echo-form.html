<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Echo Test Form</title>
</head>
<body>

<h1>Echo Test Form</h1>

<form id="echoForm"
      action="/cgi-bin/echo-python.py"
      method="get">

  <label>HTTP Method:</label>
  <select id="method">
    <option>GET</option>
    <option>POST</option>
    <option>PUT</option>
    <option>DELETE</option>
  </select>
  <br><br>

  <label>Encoding:</label>
  <select id="encoding">
    <option value="form">x-www-form-urlencoded</option>
    <option value="json">application/json</option>
  </select>
  <br><br>

  <label>Message:</label>
  <input type="text" id="message" name="message">
  <br><br>

  <button type="submit">Send</button>
</form>

<pre id="output"></pre>

<script>
document.getElementById("echoForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const method   = document.getElementById("method").value;
  const encoding = document.getElementById("encoding").value;
  const message  = document.getElementById("message").value;
  const output   = document.getElementById("output");

  const url = "/cgi-bin/echo-python.py";

  if (encoding === "json") {
    fetch(url, {
      method: method,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    })
    .then(r => r.text())
    .then(t => output.textContent = t);

  } else {
    const params = new URLSearchParams({ message });

    fetch(
      method === "GET" ? `${url}?${params}` : url,
      {
        method: method,
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: method === "GET" ? null : params
      }
    )
    .then(r => r.text())
    .then(t => output.textContent = t);
  }
});
</script>

<noscript>
  <p><strong>JavaScript disabled:</strong>
     This form submits using GET with x-www-form-urlencoded data.</p>
</noscript>

</body>
</html>
