  <meta charset="UTF-8">

<body>

<h1>Echo Test Form</h1>

<form id="echoForm" action="/hw2/cgi-bin/echo-python.py" method="POST">
  <label for="language">Language:</label>
  <select id="language">
    <option value="py">Python</option>
    <option value="cgi">C++</option>
    <option value="jsp">JSP</option>
  </select>
  <br><br>

  <label for="method">HTTP Method:</label>
  <select id="method">
    <option value="GET">GET</option>
    <option value="POST" selected>POST</option>
    <option value="PUT">PUT</option>
    <option value="DELETE">DELETE</option>
  </select>
  <br><br>

  <label for="encoding">Encoding:</label>
  <select id="encoding">
    <option value="form">x-www-form-urlencoded</option>
    <option value="json">application/json</option>
  </select>
  <br><br>

  <label for="message">Message:</label>
  <input type="text" id="message" name="message">
  <br><br>

  <button type="submit">Send</button>
</form>

<pre id="output" style="border: 1px solid #ccc; padding: 10px; margin-top: 20px;"></pre>

<script src="../scripts/echo-form.js" defer></script>

<noscript>
  <hr>
  <p style="color: red;"><strong>JavaScript disabled:</strong> The form will default to the Python endpoint using standard POST.</p>
</noscript>

<div id="responseContainer"></div>

</body>
</html>
